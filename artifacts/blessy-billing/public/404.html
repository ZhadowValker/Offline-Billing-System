<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blessy Billing</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the path into a query param so index.html can restore it
      var seg = 1; // number of path segments for the repo base (1 = /Offline-Billing-System)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
