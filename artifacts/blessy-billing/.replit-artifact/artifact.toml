kind = "web"
previewPath = "/"
title = "Blessy Packagings Billing"
version = "1.0.0"
id = "artifacts/blessy-billing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21685

[services.development]
run = "pnpm --filter @workspace/blessy-billing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blessy-billing", "run", "build" ]
publicDir = "artifacts/blessy-billing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21685"
BASE_PATH = "/"
